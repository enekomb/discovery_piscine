<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
</head>
<body>
    <center>
        <h1>Calculator 2.0</h1>
    <input id="numb1" type="number"></input>
    <select id="oper">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
        <option value="%">%</option>
    </select>
    <input id="numb2" type="number"></input>
    <button onclick="calc()">Try me!</button>
</center>
</body>
<script>
    setInterval(function () {console.log('Please, use me...'), alert("Please, use me...")}, 30000);
    function calc() {
    var numb1 = +document.getElementById("numb1").value;
    var numb2 = +document.getElementById("numb2").value;
    var operP = document.getElementById("oper");
    var sign = operP.options[operP.selectedIndex].value;
    if (numb1 < 0 || numb2 < 0) {
        console.log('Error :('), alert("Error :(")
            } else if (sign === '+') {
                console.log(numb1 + numb2), alert(numb1 + numb2)
            } else if (sign === '-') {
                console.log(numb1 - numb2), alert(numb1 - numb2)
            } else if (sign === '*') {
                console.log(numb1 * numb2), alert(numb1 * numb2)
            } else if (sign === '%' && numb2 === 0) {
                console.log("it's over 9000!"), alert("it's over 9000!")
            } else if (sign === '/' && numb2 === 0) {
                console.log("it's over 9000!"), alert("it's over 9000!")
            }  else if (sign === '/') {
                console.log(numb1 / numb2), alert(numb1 / numb2)
            } else {
                console.log(numb1 % numb2), alert(numb1 % numb2)
            }
}
</script>
</html>
