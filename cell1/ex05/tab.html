<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style type="text/css">
        html, body {
				margin: 0%;
				padding: 0%;
				height: 100%;
		}
        table{
            border-collapse: collapse;
			width: 100%;
            height: 200px;
        }
        td{
            border: 1px solid #333;
        }
        .tabla1{
            width: 50%;
            background-color: green;
        }
        .tabla2{
            width: 50%;
            background-color: blue;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td class="tabla1">Hola</td>
            <td class="tabla2">Mundo</td>
        </tr>
    </table>
    
</body>
</html>
