<!DOCTYPE html>
<html lang="en">
    <head>
		<meta charset="UTF-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-witdh, initial-scale=1.0">
        <title>Responsive</title>
		<style>
			html, body {
				margin: 0%;
				padding: 0%;
				height: 100%;
			}
			table {
                border-spacing: 0;
                border:  1px solid #333;
				height: 100%;
				width: 100%;
            }
			td{
            border: 1px solid #333;
        	}
			.left {
				width: 50%;
				background-color: yellowgreen;
			}
			.right {
				width: 50%;
				background-color: blueviolet;
			}
		</style>
	</head>
	<body>
		<table>
				<tr>
					<td class="left"> Hola </td>
					<td class="right"> Mundo </td>
				</tr>
		</table>
	</body>
</html>
